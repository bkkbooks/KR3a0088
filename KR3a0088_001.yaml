body:
  text: 周子古今賢士大夫所以失名喪身傾家害國者其由非一也然要其大歸總其常患四者而已急論議一也爭名勢二也重朋黨三也務欲速四也急論議則傷人爭名勢則敗友重朋黨則蔽主務欲速則失德此四者不除未有能全也當世君子能不然者亦比有之豈獨古人乎然論其絕異未若顧豫章諸葛使步丞相嚴衛尉張奮威之為美也論語言夫子恂恂然善誘人又曰成人之美不成人之惡豫章有之矣望之儼然即之溫聽其言也厲使君體之矣恭而安威而不猛丞相履之矣學不求祿心無苟得衛尉奮武蹈之矣此五君者雖德實有差輕重不同至於趨舍太檢不犯四者俱一揆也昔丁諝出於孤家吾粲由於牧豎豫章揚其善以並陸全之列是以人無幽滯而風俗厚焉使君丞相衛尉三君昔以布衣俱相友善諸論者因各敘其優劣初先衛尉次丞相而後有使君也其後並事明主經營事務出處之才有不同先後之名須反其初此世常人所決勤薄也至於三君分好卒無虧損豈非古人交哉又魯橫江昔杖萬兵屯據陸口當世之美業也能與不能孰不願焉而橫江既亡衛尉應其選自以才非將帥深辭固讓終於不就後徙九列遷典八座榮不足以自曜祿不足以自奉至於二君皆位為上將窮富極貴衛尉既無求欲二君又不稱薦各守所志保其名好孔子曰君子矜而不爭群而不黨斯有風矣又奮威之名亦三君之次也當一方之戍受上將之任與使君丞相不異也然歷國事論功勞實有先後故爵位之榮殊焉而奮威將處此決能明其部分心無失道之欲事無充詘之求每升朝堂循禮而動辭氣謇謇罔不惟忠叔嗣雖親貴言憂其敗蔡文至雖疏賤談稱其賢女配太子受禮若弔慷慨之趨惟篤人論成敗得失皆如所慮可謂守道見機好古之士也若乃經國家當軍旅於馳騖之際立霸王之功此五者未為過人至其純粹履道求不苟得升降當世保全名行邈然絕俗實有所師故粗論其事以示後之君子吳志步騭傳云潁川周昭蒼書釋步騭及嚴峻等交之為道起自羲皇造化之初君臣始立而有人偷上下之敘象天地交泰以左右於民也唐虞三代莫不因之故交全情親則國安治強交敗情乘則國危治弱立交者欲其親也是故百姓不親禼作司徒疏者能睦廉頗相如忍忿以崇厚陳平周勃感陸生而相親所以安趙於強敵定漢於幾殆此交接之大義帝王之極務聞之於易曰交乃人倫之本務王道之大義也太平御覽卷四百六引周昭新撰猶奉漏甕沃焦釜白居易六帖
